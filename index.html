<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlassLab | Glassmorphism & Shadow Playground</title>
    <meta name="description" content="Interactive Glassmorphism & Shadow Design Playground. Generate CSS & Tailwind code in real-time." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <h1>GlassLab</h1>
                <span>Design Playground</span>
            </div>

            <nav class="tabs">
                <button class="tab active" data-tab="glass">Glass</button>
                <button class="tab" data-tab="shadow">Shadow</button>
                <button class="tab" data-tab="radius">Radius</button>
                <button class="tab" data-tab="background">Background</button>
            </nav>

            <section id="controls"></section>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <h2>Live Preview</h2>
                <div class="actions">
                    <button id="favoriteBtn" class="btn btn-secondary">★ Favorite</button>
                    <button id="resetBtn" class="btn btn-danger">↺ Reset</button>
                </div>
            </header>

            <section class="preview-area" id="previewCanvas">
                <div id="previewCard" draggable="false">
                    <h3>Glass Card</h3>
                    <p>Modern glassmorphism UI component.</p>
                </div>
            </section>

            <div class="code-container">
                <section class="code-section">
                    <div class="code-header">
                        <h3>Generated CSS</h3>
                        <button id="copyCssBtn" class="btn btn-primary">Copy CSS</button>
                    </div>
                    <pre><code id="cssOutput">/* Loading CSS... */</code></pre>
                </section>

                <section class="code-section">
                    <div class="code-header">
                        <h3>Generated Tailwind</h3>
                        <button id="copyTailwindBtn" class="btn btn-primary">Copy Tailwind</button>
                    </div>
                    <pre><code id="tailwindOutput">/* Loading Tailwind... */</code></pre>
                </section>
            </div>
        </main>

        <aside class="right-panel">
            <div class="panel">
                <div class="panel-header">
                    <h3>Presets</h3>
                </div>
                <div id="presetsContainer"></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3>History & Favorites</h3>
                </div>
                <div id="historyList"></div>
            </div>
        </aside>
    </div>

    <div id="toast"></div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
